[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quant-platform-ml"
version = "5.0.0"
description = "MLOps and model adapter modules for Quant Platform"
readme = "../../README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Quant Platform Team"},
]
dependencies = [
    "quant-platform-core==5.0.0",
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
]

[project.optional-dependencies]
qlib = ["qlib>=0.9.2"]
finrl = ["finrl>=0.3.7", "stable-baselines3>=2.2.0", "gymnasium>=0.29.0"]
torch = ["torch>=2.1.0"]
all = ["quant-platform-ml[qlib,finrl,torch]", "lightgbm>=4.0.0"]

[project.urls]
Homepage = "https://github.com/magic-alt/stock"
Repository = "https://github.com/magic-alt/stock"

[tool.setuptools.packages.find]
where = ["../.."]
include = [
    "quant_platform_ml*",
    "src.mlops*",
    "src.adapters.ml*",
]
