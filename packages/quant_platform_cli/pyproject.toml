[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quant-platform-cli"
version = "5.0.0"
description = "Command-line tools for Quant Platform"
readme = "../../README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Quant Platform Team"},
]
dependencies = [
    "quant-platform-core==5.0.0",
    "quant-platform-sdk==5.0.0",
    "quant-platform-adapters-cn==5.0.0",
    "click>=8.0.0",
    "rich>=13.0.0",
]

[project.scripts]
quant-platform = "src.cli.main:main"
quant-backtest = "quant_platform_cli.backtest:main"

[project.urls]
Homepage = "https://github.com/magic-alt/stock"
Repository = "https://github.com/magic-alt/stock"

[tool.setuptools]
py-modules = ["unified_backtest_framework"]

[tool.setuptools.packages.find]
where = ["../.."]
include = [
    "quant_platform_cli*",
    "src.cli*",
    "src.backtest*",
    "src.data_sources*",
    "src.optimizer*",
    "src.strategies*",
]
