[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quant-platform-web"
version = "5.0.0"
description = "FastAPI platform services and web console metadata for Quant Platform"
readme = "../../README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Quant Platform Team"},
]
dependencies = [
    "quant-platform-core==5.0.0",
    "quant-platform-adapters-cn==5.0.0",
    "fastapi>=0.100.0",
    "uvicorn[standard]>=0.20.0",
]

[project.scripts]
quant-platform-api = "quant_platform_web.cli:main"

[project.urls]
Homepage = "https://github.com/magic-alt/stock"
Repository = "https://github.com/magic-alt/stock"

[tool.setuptools.packages.find]
where = ["../.."]
include = [
    "quant_platform_web*",
    "src.platform*",
]
