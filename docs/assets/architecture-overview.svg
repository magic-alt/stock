<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
  <title id="title">Unified Quant Platform — V6 Open-Platform Architecture</title>
  <desc id="desc">Layered view of the V6 open platform: plugin SDK, SPI/registry, engines and adapters, runtime contexts, and the shared kernel services.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .h1   { font-family: ui-sans-serif, Segoe UI, Arial, sans-serif; fill:#f8fafc; font-size:30px; font-weight:700; }
      .h2   { font-family: ui-sans-serif, Segoe UI, Arial, sans-serif; fill:#cbd5e1; font-size:14px; }
      .lbl  { font-family: ui-sans-serif, Segoe UI, Arial, sans-serif; fill:#f8fafc; font-size:17px; font-weight:700; }
      .sub  { font-family: ui-sans-serif, Segoe UI, Arial, sans-serif; fill:#cbd5e1; font-size:12px; }
      .tag  { font-family: ui-monospace, Consolas, monospace; fill:#cbd5e1; font-size:11px; }
      .layer{ font-family: ui-sans-serif, Segoe UI, Arial, sans-serif; fill:#94a3b8; font-size:12px; font-weight:600; letter-spacing:0.12em; }
      .box  { rx:14; filter:url(#shadow); stroke:rgba(255,255,255,0.10); stroke-width:1.1; }
      .line { stroke:#94a3b8; stroke-width:2.2; fill:none; marker-end:url(#arrow); opacity:0.85; }
      .dash { stroke:#64748b; stroke-width:1.6; fill:none; stroke-dasharray:5 4; opacity:0.85; }
    </style>
  </defs>

  <rect width="1280" height="780" fill="url(#bg)"/>
  <circle cx="1140" cy="100" r="170" fill="#14b8a6" opacity="0.07"/>
  <circle cx="120" cy="660" r="180" fill="#f97316" opacity="0.07"/>

  <text x="60" y="60" class="h1">Unified Quant Platform — V6 Open Platform</text>
  <text x="60" y="86" class="h2">Plugin SDK · SPI registry · canonical engines &amp; adapters · runtime contexts · shared kernel.</text>

  <!-- Layer 1: Plugin SDK & Plugins -->
  <text x="60" y="130" class="layer">PLUGIN SURFACE</text>
  <rect x="60"  y="142" width="280" height="86" fill="#0ea5e9" class="box"/>
  <text x="78"  y="172" class="lbl">Plugin SDK</text>
  <text x="78"  y="194" class="sub">BaseStrategy · BaseAdapter · BasePlugin</text>
  <text x="78"  y="212" class="tag">pip install · cookiecutter template</text>

  <rect x="360" y="142" width="300" height="86" fill="#8b5cf6" class="box"/>
  <text x="378" y="172" class="lbl">Plugins (3rd-party + built-in)</text>
  <text x="378" y="194" class="sub">strategies · data sources · brokers · ML</text>
  <text x="378" y="212" class="tag">examples/plugins/ · entry_points</text>

  <rect x="680" y="142" width="280" height="86" fill="#22d3ee" class="box"/>
  <text x="698" y="172" class="lbl">CLI · GUI · Web Console</text>
  <text x="698" y="194" class="sub">unified_backtest_framework · backtest_gui</text>
  <text x="698" y="212" class="tag">FastAPI v2 + Vue3/Vite console</text>

  <rect x="980" y="142" width="240" height="86" fill="#f59e0b" class="box"/>
  <text x="998" y="172" class="lbl">API v2</text>
  <text x="998" y="194" class="sub">/api/v2/jobs · reports · monitor</text>
  <text x="998" y="212" class="tag">/api/v2/info → contract_version</text>

  <!-- Layer 2: SPI / Registry -->
  <text x="60" y="262" class="layer">SPI / REGISTRY</text>
  <rect x="60" y="274" width="1160" height="62" fill="#1e293b" stroke="#475569" stroke-width="1.3" class="box"/>
  <text x="84" y="304" class="lbl">PluginRegistry · PluginSPI · Contract version gate</text>
  <text x="84" y="324" class="sub">Discover · validate · test · load — single entry point for every plugin and runtime.</text>
  <text x="900" y="312" class="tag">src/core/plugin_registry.py · src/sdk/</text>

  <!-- Layer 3: Engines & Adapters -->
  <text x="60" y="372" class="layer">ENGINES &amp; ADAPTERS (canonical re-exports of V5 modules)</text>

  <!-- Engines (left) -->
  <rect x="60" y="384" width="555" height="170" fill="#10b981" class="box" opacity="0.92"/>
  <text x="84" y="414" class="lbl">Engines</text>
  <text x="84" y="436" class="sub">Per-domain composition ring over V5 implementations.</text>
  <g font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#0b1220">
    <rect x="84"  y="450" width="155" height="34" rx="8" fill="#d1fae5"/>
    <text x="92"  y="471">engines.data</text>
    <rect x="252" y="450" width="155" height="34" rx="8" fill="#d1fae5"/>
    <text x="260" y="471">engines.execution</text>
    <rect x="420" y="450" width="180" height="34" rx="8" fill="#d1fae5"/>
    <text x="428" y="471">engines.risk · portfolio</text>
    <rect x="84"  y="494" width="155" height="34" rx="8" fill="#d1fae5"/>
    <text x="92"  y="515">engines.backtest</text>
    <rect x="252" y="494" width="155" height="34" rx="8" fill="#d1fae5"/>
    <text x="260" y="515">engines.research</text>
    <rect x="420" y="494" width="180" height="34" rx="8" fill="#d1fae5"/>
    <text x="428" y="515">engines.report · attribution</text>
  </g>

  <!-- Adapters (right) -->
  <rect x="635" y="384" width="585" height="170" fill="#f97316" class="box" opacity="0.92"/>
  <text x="659" y="414" class="lbl">Adapters</text>
  <text x="659" y="436" class="sub">Stable namespace for IO + integrations.</text>
  <g font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#0b1220">
    <rect x="659" y="450" width="165" height="34" rx="8" fill="#fed7aa"/>
    <text x="667" y="471">adapters.data</text>
    <rect x="836" y="450" width="180" height="34" rx="8" fill="#fed7aa"/>
    <text x="844" y="471">adapters.realtime</text>
    <rect x="1028" y="450" width="180" height="34" rx="8" fill="#fed7aa"/>
    <text x="1036" y="471">adapters.broker</text>
    <rect x="659" y="494" width="165" height="34" rx="8" fill="#fed7aa"/>
    <text x="667" y="515">adapters.storage</text>
    <rect x="836" y="494" width="180" height="34" rx="8" fill="#fed7aa"/>
    <text x="844" y="515">adapters.ml</text>
    <rect x="1028" y="494" width="180" height="34" rx="8" fill="#fed7aa"/>
    <text x="1036" y="515">adapters.messaging</text>
  </g>

  <!-- Layer 4: Runtimes -->
  <text x="60" y="592" class="layer">RUNTIME CONTEXTS</text>
  <rect x="60"  y="604" width="370" height="90" fill="#6366f1" class="box"/>
  <text x="78"  y="634" class="lbl">BacktestRuntime</text>
  <text x="78"  y="656" class="sub">Deterministic replay over historical bars.</text>
  <text x="78"  y="676" class="tag">policy: replay · clock=virtual</text>

  <rect x="455" y="604" width="370" height="90" fill="#a78bfa" class="box"/>
  <text x="473" y="634" class="lbl">SandboxRuntime</text>
  <text x="473" y="656" class="sub">Paper trading on live data with stubbed broker.</text>
  <text x="473" y="676" class="tag">policy: paper · clock=wall</text>

  <rect x="850" y="604" width="370" height="90" fill="#ec4899" class="box"/>
  <text x="868" y="634" class="lbl">LiveRuntime</text>
  <text x="868" y="656" class="sub">Live gateways + admission gate enforcement.</text>
  <text x="868" y="676" class="tag">policy: live · clock=wall</text>

  <!-- Kernel -->
  <text x="60" y="722" class="layer">KERNEL (shared services)</text>
  <rect x="60" y="734" width="1160" height="36" fill="#0f172a" stroke="#334155" stroke-width="1.1" class="box"/>
  <g font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#cbd5e1">
    <text x="84"  y="757">Config · ConfigPort</text>
    <text x="270" y="757">MetricCollector · MetricsPort</text>
    <text x="500" y="757">Tracer · TracerPort</text>
    <text x="680" y="757">Audit · EventBus</text>
    <text x="850" y="757">JobQueue · JobStore</text>
    <text x="1030" y="757">Secrets · RBAC</text>
  </g>

  <!-- Arrows: surface → registry -->
  <path class="line" d="M200,228 L200,272"/>
  <path class="line" d="M510,228 L510,272"/>
  <path class="line" d="M820,228 L820,272"/>
  <path class="line" d="M1100,228 L1100,272"/>

  <!-- Registry → engines/adapters -->
  <path class="line" d="M340,336 L340,382"/>
  <path class="line" d="M920,336 L920,382"/>

  <!-- Engines/Adapters ↔ runtimes -->
  <path class="dash" d="M340,554 L240,602"/>
  <path class="dash" d="M640,602 L640,554"/>
  <path class="dash" d="M920,554 L1035,602"/>

  <!-- Runtimes → kernel -->
  <path class="line" d="M245,694 L245,732"/>
  <path class="line" d="M640,694 L640,732"/>
  <path class="line" d="M1035,694 L1035,732"/>
</svg>
