<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Unified Quant Platform Architecture</title>
  <desc id="desc">Architecture overview showing CLI, web console, API, backtesting, admission, gateways, risk, audit, and reports.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#12343b"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#9ca3af"/>
    </marker>
    <style>
      .label { font-family: ui-sans-serif, Segoe UI, Arial, sans-serif; fill: #f8fafc; font-size: 25px; font-weight: 700; }
      .sub { font-family: ui-sans-serif, Segoe UI, Arial, sans-serif; fill: #cbd5e1; font-size: 15px; }
      .small { font-family: ui-sans-serif, Segoe UI, Arial, sans-serif; fill: #d1d5db; font-size: 14px; }
      .box { rx: 22; filter: url(#shadow); stroke: rgba(255,255,255,0.16); stroke-width: 1.2; }
      .line { stroke: #9ca3af; stroke-width: 3; fill: none; marker-end: url(#arrow); opacity: 0.9; }
    </style>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <circle cx="1050" cy="96" r="160" fill="#14b8a6" opacity="0.08"/>
  <circle cx="116" cy="520" r="170" fill="#f97316" opacity="0.08"/>
  <text x="70" y="74" class="label" font-size="32">A-share Quant Research Platform</text>
  <text x="70" y="104" class="sub">Strategy admission, backtesting, paper trading, web console, and live gateway adapters.</text>

  <rect x="70" y="170" width="210" height="110" fill="#0ea5a4" class="box"/>
  <text x="104" y="214" class="label">CLI / GUI</text>
  <text x="104" y="244" class="sub">backtest, grid, admission</text>

  <rect x="70" y="340" width="210" height="110" fill="#2563eb" class="box"/>
  <text x="104" y="384" class="label">Web Console</text>
  <text x="104" y="414" class="sub">Dashboard, Backtest, Trading</text>

  <rect x="385" y="255" width="225" height="130" fill="#334155" class="box"/>
  <text x="432" y="306" class="label">FastAPI v2</text>
  <text x="432" y="336" class="sub">jobs, reports, monitor, API</text>

  <rect x="730" y="120" width="210" height="105" fill="#f97316" class="box"/>
  <text x="760" y="162" class="label">Backtest</text>
  <text x="760" y="191" class="sub">A-share rules + reports</text>

  <rect x="730" y="255" width="210" height="105" fill="#22c55e" class="box"/>
  <text x="760" y="297" class="label">Admission</text>
  <text x="760" y="326" class="sub">baseline + stage gates</text>

  <rect x="730" y="390" width="210" height="105" fill="#8b5cf6" class="box"/>
  <text x="760" y="432" class="label">Gateways</text>
  <text x="760" y="461" class="sub">paper, stub, live adapters</text>

  <rect x="990" y="255" width="150" height="105" fill="#475569" class="box"/>
  <text x="1019" y="297" class="label">Risk</text>
  <text x="1019" y="326" class="sub">OMS + audit</text>

  <rect x="990" y="390" width="150" height="105" fill="#0f766e" class="box"/>
  <text x="1018" y="432" class="label">Reports</text>
  <text x="1018" y="461" class="sub">JSON, MD, charts</text>

  <path class="line" d="M280 225 C330 225 340 300 385 312"/>
  <path class="line" d="M280 395 C330 395 340 340 385 326"/>
  <path class="line" d="M610 308 C660 250 680 185 730 175"/>
  <path class="line" d="M610 320 L730 308"/>
  <path class="line" d="M610 332 C660 390 682 438 730 443"/>
  <path class="line" d="M940 443 L990 443"/>
  <path class="line" d="M940 308 L990 308"/>
  <path class="line" d="M1065 360 L1065 390"/>

  <text x="70" y="560" class="small">First run: python examples/one_click_demo.py --out-dir report/open_source_demo</text>
</svg>