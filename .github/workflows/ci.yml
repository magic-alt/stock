name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ".[api,perf,dev]" || pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist httpx
        pip install pyarrow scipy jinja2 duckdb

    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short --override-ini="addopts=-v --tb=short" -x

    - name: Run tests with coverage
      if: matrix.os == 'ubuntu-latest'
      run: |
        python -m pytest tests/ --cov=src --cov-report=xml --override-ini="addopts="
      continue-on-error: true

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
      continue-on-error: true

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy

    - name: Run Ruff (linter + formatter)
      run: |
        ruff check src/ --select E,W,F --ignore E501,E402,W503 --exit-zero
        ruff format --check src/ --line-length 120 || true
      continue-on-error: true

    - name: Run MyPy (type checker)
      run: |
        pip install -r requirements.txt
        pip install types-PyYAML types-requests
        mypy src/core/exceptions.py src/core/input_sanitizer.py src/core/plugin.py --ignore-missing-imports
      continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit

    - name: Run Bandit (security linter)
      run: bandit -r src/ -f json -o bandit-report.json -ll
      continue-on-error: true

    - name: Run pip-audit (dependency vulnerabilities)
      run: |
        pip install -r requirements.txt
        pip-audit --format json --output pip-audit-report.json || true
      continue-on-error: true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          pip-audit-report.json

  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install MkDocs
      run: |
        pip install mkdocs mkdocs-material pymdown-extensions

    - name: Validate mkdocs.yml
      run: |
        python -c "import yaml; yaml.safe_load(open('mkdocs.yml'))" && echo "mkdocs.yml is valid YAML"

  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm install

    - name: Type check frontend
      working-directory: frontend
      run: npx vue-tsc --noEmit || true
      continue-on-error: true

    - name: Build frontend
      working-directory: frontend
      run: npx vite build || true
      continue-on-error: true

  docker-validate:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate Dockerfile
      run: |
        docker build --target production -t quant-platform:test . || echo "Docker build skipped (no Docker)"
      continue-on-error: true

    - name: Validate docker-compose
      run: |
        docker compose config || echo "docker-compose validation skipped"
      continue-on-error: true

  performance:
    name: Performance Regression Gate
    runs-on: ubuntu-latest
    needs: [test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Restore performance baseline
      uses: actions/cache@v4
      with:
        path: benchmark_baselines/
        key: perf-baseline-${{ github.ref_name }}
        restore-keys: |
          perf-baseline-main
          perf-baseline-

    - name: Run performance benchmark
      env:
        PYTHONPATH: .
      run: |
        mkdir -p benchmark_baselines
        python scripts/benchmark_platform.py \
          --jobs 20 --workers 2 --sleep-ms 5 \
          --check-thresholds \
          --save-baseline --baseline-dir benchmark_baselines \
          --check-regression --baseline-dir benchmark_baselines

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: benchmark_baselines/

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install httpx click rich

    - name: Run integration tests
      run: |
        python -m pytest tests/ -m "integration" -v --override-ini="addopts=-v --tb=short" || echo "No integration tests found"
      continue-on-error: true

    - name: Test CLI v2
      run: |
        python -m src.cli.main --version
        python -m src.cli.main strategy list || true
        python -m src.cli.main monitor status

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, code-quality, security-scan, performance]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Build package
      run: |
        python -m pip install --upgrade pip build
        python -m build

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        body_path: CHANGELOG.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
