name: Close stale issues and PRs

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # ── Issues ──────────────────────────────────────────
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has had no activity for 60 days and is now marked as
            stale. It will be closed in 7 days unless there is further
            discussion or a label is added. If this is still relevant,
            please leave a comment to keep it open.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if the issue
            persists.
          exempt-issue-labels: "pinned,security,roadmap,good first issue"

          # ── Pull Requests ───────────────────────────────────
          days-before-pr-stale: 45
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            This pull request has had no activity for 45 days and is now
            marked as stale. It will be closed in 7 days unless updated.
          close-pr-message: >
            Closing due to inactivity. Please reopen or create a new PR
            when ready to continue.
          exempt-pr-labels: "pinned,dependencies"

          # ── General ─────────────────────────────────────────
          operations-per-run: 30
