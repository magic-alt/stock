[pytest]
testpaths = tests
addopts = -v --tb=short --cov=src/optimizer --cov=src/strategies/ml_strategies.py --cov=src/strategies/ml_enhanced_strategy.py --cov-report=term-missing --cov-fail-under=90
markers =
    integration: integration tests
    slow: slow tests
    load: load and throughput tests
    fault: fault scenario tests
    e2e: end-to-end workflow tests
